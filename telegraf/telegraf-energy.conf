# Energy pipeline: parse MQTT topic into hierarchy tags and write to InfluxDB "energy" measurement.
# Include with main config: telegraf --config telegraf.conf --config telegraf-energy.conf
# Topic pattern: plant/{site}/{area}/{line}/{equipment}/{tag} (see docs/energy-mqtt-topics.md)

[[inputs.mqtt_consumer]]
  servers = ["tcp://monstermq:1883"]
  topics = ["plant/#"]
  data_format = "json"
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  tag_keys = ["protocol", "tagId", "quality"]
  json_string_fields = []
  name_override = "energy"

# Parse topic into hierarchy tags: plant/site/area/line/equipment/tag_name
[[processors.regex]]
  order = 1
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^plant/([^/]+)/([^/]+)/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${1}"
    result_key = "site"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^plant/([^/]+)/([^/]+)/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${2}"
    result_key = "area"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^plant/([^/]+)/([^/]+)/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${3}"
    result_key = "line"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^plant/([^/]+)/([^/]+)/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${4}"
    result_key = "equipment"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^plant/([^/]+)/([^/]+)/([^/]+)/([^/]+)/([^/]+)$"
    replacement = "${5}"
    result_key = "tag_name"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "super-secret-auth-token"
  organization = "nexus-corp"
  bucket = "historian"
  measurement = "energy"

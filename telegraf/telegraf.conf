# Telegraf Configuration for Unified Namespace
# Subscribes to MQTT and writes to InfluxDB

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "0s"
  omit_hostname = false

# 1. Read from MonsterMQ (MQTT)
[[inputs.mqtt_consumer]]
  servers = ["tcp://monstermq:1883"]
  topics = [
    "plant/#"
  ]
  data_format = "json"
  
  # Parse the JSON payload from the connector
  # Example payload: {"protocol":"opcua","tagId":"T101","value":85.4,"quality":"good","timestamp":"..."}
  json_time_key = "timestamp"
  json_time_format = "2006-01-02T15:04:05Z07:00"
  
  tag_keys = [
    "protocol",
    "tagId",
    "quality"
  ]
  
  json_string_fields = []

# 2. Write to InfluxDB v2
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "super-secret-auth-token"
  organization = "nexus-corp"
  bucket = "historian"
  
  # Map the MQTT topic to the InfluxDB measurement name
  # e.g., plant/reactor1/t101 -> measurement="mqtt_consumer" (default)
  # We can use processors to extract the topic into tags if needed.
